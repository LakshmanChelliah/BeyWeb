<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Sumo | PC Edition</title>
  <base href="/" id="beyweb-base" />
  <script>
    (function () {
      var p = location.pathname;
      if (/\/pc\/?$/i.test(p)) p = p.replace(/\/pc\/?$/i, '');
      else if (/\/[^/]+\.html$/i.test(p)) p = p.replace(/\/[^/]+\.html$/i, '');
      if (!p.endsWith('/')) p += '/';
      window.__BEYWEB_BASE__ = p === '/' ? '' : p.replace(/\/$/, '');
      window.__BEYWEB_ASSET_V__ = '22';
      if (location.hostname.endsWith('github.io')) {
        window.__BEYWEB_WS__ = 'wss://beyweb-production.up.railway.app';
      }
      var baseEl = document.getElementById('beyweb-base');
      if (baseEl) baseEl.href = p;
    })();
  </script>
  <script src="js/net/entryRoute.js?v=22"></script>
  <script src="js/head-boot.js?v=22"></script>
  <link rel="stylesheet" href="css/game.css?v=22" />
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div class="hud-panel">
      <img class="hud-avatar" id="player-avatar" src="updatedLdragoLogo.png" alt="" />
      <div class="hud-info">
        <div class="hud-label" id="player-hud-label">P1 · Spin</div>
        <div class="hud-value" id="player-spin">100%</div>
        <div class="hud-bar-wrap"><div class="hud-bar" id="player-bar" style="width:100%"></div></div>
      </div>
    </div>
    <div class="hud-panel hud-side-ai">
      <img class="hud-avatar" id="ai-avatar" src="pegasusLogo.png" alt="" />
      <div class="hud-info">
        <div class="hud-label" id="ai-hud-label">P2 · Spin</div>
        <div class="hud-value" id="ai-spin">100%</div>
        <div class="hud-bar-wrap"><div class="hud-bar" id="ai-bar" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <div id="controls-hint">WASD to steer · <kbd>Q</kbd> power · <kbd>E</kbd> special</div>

  <div id="campaign-hud" class="campaign-hud hidden" aria-live="polite"></div>

  <div id="p1-abilities" class="ability-bar ability-bar-left"></div>
  <div id="p2-abilities" class="ability-bar ability-bar-right"></div>

  <div id="special-flash"><img id="special-flash-img" alt="" /></div>

  <div id="select-overlay"><div id="play-setup" class="play-setup"></div></div>

  <div id="start-overlay">
    <div class="logo-ring"></div>
    <h1>Spin Sumo</h1>
    <p id="start-blurb">Tournament: best of 3 vs five rivals in rising order.</p>
    <div class="key-hints" id="start-keys">
      <kbd>W</kbd>
      <kbd>A</kbd>
      <kbd>S</kbd>
      <kbd>D</kbd>
      <span style="width:12px"></span>
      <kbd>&uarr;</kbd>
      <kbd>&larr;</kbd>
      <kbd>&darr;</kbd>
      <kbd>&rarr;</kbd>
    </div>
    <button id="btn-start">Start Game</button>
    <p id="permission-hint">Press Enter or Space to start</p>
  </div>

  <div id="gameover-overlay">
    <h2 id="gameover-title">KNOCKOUT!</h2>
    <p id="gameover-msg">You win!</p>
    <div class="gameover-actions">
      <button id="btn-restart" type="button">Play Again</button>
      <button id="btn-change-bey" type="button" class="gameover-btn-secondary">Change Bey</button>
      <button id="btn-recalibrate" type="button" class="gameover-btn-secondary hidden">Recalibrate</button>
    </div>
  </div>

  <script type="module" src="js/main-pc.js?v=22"></script>
</body>
</html>
